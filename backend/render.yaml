services:
  - type: web
    name: pythonlearn-api
    env: python
    region: singapore   # Closest to India
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py migrate --no-input &&
      python manage.py seed_data &&
      python manage.py collectstatic --no-input
    startCommand: gunicorn backend.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    healthCheckPath: /api/topics/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "pythonlearn-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://pythonlearn.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: pythonlearn-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: pythonlearn-db
    plan: free
    region: singapore
